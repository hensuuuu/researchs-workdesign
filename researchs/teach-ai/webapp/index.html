<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 실무 커리큘럼</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', -apple-system, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* 레이아웃 */
    .layout {
      display: flex;
      min-height: 100vh;
    }

    /* 사이드바 */
    .sidebar {
      width: 260px;
      background: #1a1a1a;
      border-right: 1px solid #2a2a2a;
      padding: 24px 0;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      overflow-y: auto;
    }

    .sidebar-logo {
      padding: 0 20px 24px;
      border-bottom: 1px solid #2a2a2a;
    }

    .sidebar-logo h1 {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      line-height: 1.4;
    }

    .sidebar-logo p {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
    }

    .sidebar-nav {
      padding: 16px 0;
    }

    .phase-group {
      margin-bottom: 4px;
    }

    .phase-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s;
      border-radius: 0;
    }

    .phase-btn:hover { background: #252525; }
    .phase-btn.active { background: #1e3a5f; }

    .phase-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .phase-icon.done { background: #1a4731; color: #4ade80; }
    .phase-icon.active-icon { background: #1e3a5f; color: #60a5fa; }
    .phase-icon.locked { background: #2a2a2a; color: #555; }

    .phase-label {
      flex: 1;
    }

    .phase-label-title {
      font-size: 12px;
      font-weight: 600;
      color: #ccc;
      line-height: 1.3;
    }

    .phase-label-sub {
      font-size: 10px;
      color: #555;
      margin-top: 2px;
    }

    .phase-progress-bar {
      width: 100%;
      height: 2px;
      background: #2a2a2a;
      margin: 0 20px;
      width: calc(100% - 40px);
      border-radius: 1px;
      overflow: hidden;
    }

    .phase-progress-fill {
      height: 100%;
      background: #3b82f6;
      border-radius: 1px;
      transition: width 0.3s;
    }

    /* 메인 */
    .main {
      margin-left: 260px;
      flex: 1;
      padding: 40px;
      max-width: 820px;
    }

    /* 대시보드 */
    .dashboard {
      display: none;
    }

    .dashboard.visible { display: block; }

    .dash-header {
      margin-bottom: 32px;
    }

    .dash-header h2 {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
    }

    .dash-header p {
      color: #666;
      margin-top: 6px;
      font-size: 14px;
    }

    .phase-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .phase-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
    }

    .phase-card:hover {
      border-color: #3b82f6;
      transform: translateY(-1px);
    }

    .phase-card.completed {
      border-color: #1a4731;
    }

    .card-phase-num {
      font-size: 11px;
      color: #555;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      margin-top: 8px;
      line-height: 1.3;
    }

    .card-desc {
      font-size: 12px;
      color: #666;
      margin-top: 6px;
      line-height: 1.5;
    }

    .card-progress {
      margin-top: 16px;
    }

    .card-progress-bar {
      height: 4px;
      background: #2a2a2a;
      border-radius: 2px;
      overflow: hidden;
    }

    .card-progress-fill {
      height: 100%;
      background: #3b82f6;
      border-radius: 2px;
      transition: width 0.3s;
    }

    .card-progress-text {
      font-size: 11px;
      color: #555;
      margin-top: 6px;
    }

    /* 페이지 */
    .page {
      display: none;
    }

    .page.visible { display: block; }

    .page-header {
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid #2a2a2a;
    }

    .page-phase-num {
      font-size: 11px;
      color: #3b82f6;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .page-title {
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      margin-top: 8px;
    }

    .page-desc {
      font-size: 14px;
      color: #888;
      margin-top: 8px;
      line-height: 1.6;
    }

    .page-progress-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
    }

    .page-progress-bar {
      flex: 1;
      height: 6px;
      background: #2a2a2a;
      border-radius: 3px;
      overflow: hidden;
    }

    .page-progress-fill {
      height: 100%;
      background: #3b82f6;
      border-radius: 3px;
      transition: width 0.3s;
    }

    .page-progress-text {
      font-size: 12px;
      color: #555;
      white-space: nowrap;
    }

    /* 스텝 */
    .steps {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .step {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .step.completed { border-color: #1a4731; }
    .step.current { border-color: #1e3a5f; }

    .step-header {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 18px 20px;
      cursor: pointer;
      user-select: none;
    }

    .step-check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #3a3a3a;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
      transition: all 0.15s;
      cursor: pointer;
    }

    .step.completed .step-check {
      background: #22c55e;
      border-color: #22c55e;
    }

    .step-check-icon {
      display: none;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
    }

    .step.completed .step-check-icon { display: block; }

    .step-info {
      flex: 1;
    }

    .step-title {
      font-size: 14px;
      font-weight: 600;
      color: #e0e0e0;
      line-height: 1.4;
    }

    .step.completed .step-title { color: #666; text-decoration: line-through; }

    .step-subtitle {
      font-size: 12px;
      color: #555;
      margin-top: 3px;
    }

    .step-expand {
      color: #555;
      font-size: 12px;
      margin-top: 2px;
      flex-shrink: 0;
    }

    .step-body {
      display: none;
      padding: 0 20px 20px 56px;
    }

    .step-body.open { display: block; }

    /* 인스트럭션 */
    .instruction-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .instruction-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .instruction-num {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #252525;
      color: #888;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .instruction-text {
      font-size: 13px;
      color: #bbb;
      line-height: 1.6;
    }

    .instruction-text code {
      background: #252525;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 1px 6px;
      font-family: 'Consolas', monospace;
      font-size: 12px;
      color: #60a5fa;
    }

    .instruction-text strong {
      color: #fff;
      font-weight: 600;
    }

    /* 코드 블록 */
    .code-block {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 14px 16px;
      margin: 12px 0;
      font-family: 'Consolas', monospace;
      font-size: 12px;
      color: #a0c4ff;
      line-height: 1.7;
      overflow-x: auto;
      white-space: pre;
    }

    /* 경고/팁 박스 */
    .tip-box {
      background: #1a2a1a;
      border: 1px solid #2a4a2a;
      border-left: 3px solid #22c55e;
      border-radius: 6px;
      padding: 12px 14px;
      margin: 12px 0;
      font-size: 13px;
      color: #86efac;
      line-height: 1.6;
    }

    .warn-box {
      background: #2a1a1a;
      border: 1px solid #4a2a2a;
      border-left: 3px solid #ef4444;
      border-radius: 6px;
      padding: 12px 14px;
      margin: 12px 0;
      font-size: 13px;
      color: #fca5a5;
      line-height: 1.6;
    }

    .info-box {
      background: #1a1e2a;
      border: 1px solid #2a3a5a;
      border-left: 3px solid #3b82f6;
      border-radius: 6px;
      padding: 12px 14px;
      margin: 12px 0;
      font-size: 13px;
      color: #93c5fd;
      line-height: 1.6;
    }

    /* 통과 기준 */
    .pass-criteria {
      background: #1a1e2a;
      border: 1px solid #2a3a5a;
      border-radius: 10px;
      padding: 18px 20px;
      margin-top: 24px;
    }

    .pass-criteria-title {
      font-size: 13px;
      font-weight: 700;
      color: #60a5fa;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .criteria-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .criteria-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 13px;
      color: #93c5fd;
      line-height: 1.5;
    }

    .criteria-item::before {
      content: '→';
      color: #3b82f6;
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* 완료 버튼 */
    .complete-phase-btn {
      display: block;
      width: 100%;
      margin-top: 28px;
      padding: 14px;
      background: #1e3a5f;
      border: 1px solid #2a5a9f;
      border-radius: 10px;
      color: #60a5fa;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      text-align: center;
    }

    .complete-phase-btn:hover { background: #254d80; }
    .complete-phase-btn:disabled {
      background: #1a4731;
      border-color: #1a4731;
      color: #4ade80;
      cursor: default;
    }

    /* 반복 카운터 */
    .repeat-counter {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
    }

    .repeat-label {
      font-size: 12px;
      color: #666;
    }

    .repeat-dots {
      display: flex;
      gap: 5px;
    }

    .repeat-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      cursor: pointer;
      transition: background 0.1s;
    }

    .repeat-dot.filled { background: #3b82f6; border-color: #3b82f6; }

    /* 시나리오 탭 */
    .scenario-tabs {
      display: flex;
      gap: 6px;
      margin: 12px 0 8px;
    }

    .scenario-tab {
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid #2a2a2a;
      background: #1a1a1a;
      color: #666;
      transition: all 0.15s;
    }

    .scenario-tab.active {
      background: #1e3a5f;
      border-color: #2a5a9f;
      color: #60a5fa;
    }

    .scenario-content { display: none; }
    .scenario-content.active { display: block; }

    /* 반응형 */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; padding: 20px; }
    }
  </style>
</head>
<body>
<div class="layout">

  <!-- 사이드바 -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h1>AI 실무 커리큘럼</h1>
      <p>신입사원 온보딩</p>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
  </aside>

  <!-- 메인 -->
  <main class="main">

    <!-- 대시보드 -->
    <div class="dashboard visible" id="dashboard">
      <div class="dash-header">
        <h2>전체 커리큘럼</h2>

      </div>
      <div class="phase-cards" id="phaseCards"></div>
    </div>

    <!-- 페이지들 -->
    <div id="pages"></div>

  </main>
</div>

// 상태 관리
let state = JSON.parse(localStorage.getItem('curriculum-state') || '{}');
let currentPage = 'dashboard';
let expandedSteps = {};

function saveState() {
  localStorage.setItem('curriculum-state', JSON.stringify(state));
}

function isStepDone(stepId) {
  return !!state[stepId];
}

function toggleStep(stepId) {
  state[stepId] = !state[stepId];
  saveState();
  render();
}

function getPhaseProgress(phase) {
  const done = phase.steps.filter(s => isStepDone(s.id)).length;
  return { done, total: phase.steps.length, pct: Math.round(done / phase.steps.length * 100) };
}

function getTotalProgress() {
  const allSteps = PHASES.flatMap(p => p.steps);
  const done = allSteps.filter(s => isStepDone(s.id)).length;
  return { done, total: allSteps.length };
}

function navigate(pageId) {
  currentPage = pageId;
  render();
  window.scrollTo(0, 0);
}

// 렌더링
function render() {
  renderSidebar();
  renderDashboard();
  renderPages();
}

function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = `
    <div class="phase-group">
      <button class="phase-btn ${currentPage === 'dashboard' ? 'active' : ''}" onclick="navigate('dashboard')">
        <div class="phase-icon ${currentPage === 'dashboard' ? 'active-icon' : 'locked'}">☰</div>
        <div class="phase-label">
          <div class="phase-label-title">전체 대시보드</div>
          <div class="phase-label-sub">${getTotalProgress().done}/${getTotalProgress().total} 완료</div>
        </div>
      </button>
    </div>
    ${PHASES.map(phase => {
      const prog = getPhaseProgress(phase);
      const isDone = prog.done === prog.total;
      const isActive = currentPage === phase.id;
      return `
        <div class="phase-group">
          <button class="phase-btn ${isActive ? 'active' : ''}" onclick="navigate('${phase.id}')">
            <div class="phase-icon ${isDone ? 'done' : isActive ? 'active-icon' : 'locked'}">
              ${isDone ? '✓' : phase.num.replace('Phase ', '')}
            </div>
            <div class="phase-label">
              <div class="phase-label-title">${phase.title}</div>
              <div class="phase-label-sub">${prog.done}/${prog.total} · ${phase.duration}</div>
            </div>
          </button>
          <div style="padding: 0 20px 8px;">
            <div class="phase-progress-bar">
              <div class="phase-progress-fill" style="width:${prog.pct}%"></div>
            </div>
          </div>
        </div>
      `;
    }).join('')}
  `;
}

function renderDashboard() {
  const dash = document.getElementById('dashboard');
  dash.className = 'dashboard' + (currentPage === 'dashboard' ? ' visible' : '');

  const cards = document.getElementById('phaseCards');
  cards.innerHTML = PHASES.map(phase => {
    const prog = getPhaseProgress(phase);
    return `
      <div class="phase-card ${prog.done === prog.total ? 'completed' : ''}" onclick="navigate('${phase.id}')">
        <div class="card-phase-num">${phase.num} · ${phase.duration}</div>
        <div class="card-title">${phase.title}</div>
        <div class="card-desc">${phase.desc}</div>
        <div class="card-progress">
          <div class="card-progress-bar">
            <div class="card-progress-fill" style="width:${prog.pct}%"></div>
          </div>
          <div class="card-progress-text">${prog.done}/${prog.total} 단계 완료</div>
        </div>
      </div>
    `;
  }).join('');
}

function renderPages() {
  const container = document.getElementById('pages');
  container.innerHTML = PHASES.map(phase => {
    const prog = getPhaseProgress(phase);
    const isVisible = currentPage === phase.id;
    return `
      <div class="page ${isVisible ? 'visible' : ''}" id="page-${phase.id}">
        <div class="page-header">
          <div class="page-phase-num">${phase.num}</div>
          <div class="page-title">${phase.title}</div>
          <div class="page-desc">${phase.desc} · ${phase.duration}</div>
          <div class="page-progress-row">
            <div class="page-progress-bar">
              <div class="page-progress-fill" style="width:${prog.pct}%"></div>
            </div>
            <div class="page-progress-text">${prog.done}/${prog.total}</div>
          </div>
        </div>
        <div class="steps">
          ${phase.steps.map((step, idx) => renderStep(step, idx)).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function renderStep(step, idx) {
  const done = isStepDone(step.id);
  const expanded = !!expandedSteps[step.id];
  let cls = '';
  if (done) cls = 'completed';
  else if (expanded) cls = 'current';

  return `
    <div class="step ${cls}" id="step-${step.id}">
      <div class="step-header" onclick="toggleExpand('${step.id}')">
        <div class="step-check" onclick="event.stopPropagation(); toggleStep('${step.id}')">
          <span class="step-check-icon">✓</span>
        </div>
        <div class="step-info">
          <div class="step-title">${idx + 1}. ${step.title}</div>
          <div class="step-subtitle">${step.subtitle}</div>
        </div>
        <div class="step-expand">${expanded ? '▲' : '▼'}</div>
      </div>
      <div class="step-body ${expanded ? 'open' : ''}">
        ${renderStepBody(step)}
        <div style="margin-top:16px;">
          <button style="background:#1a2a3a;border:1px solid #2a4a6a;border-radius:8px;color:#60a5fa;font-size:13px;font-weight:600;padding:10px 16px;cursor:pointer;width:100%;" onclick="toggleStep('${step.id}')">
            ${done ? '✓ 완료됨 (취소하려면 클릭)' : '✓ 이 단계 완료'}
          </button>
        </div>
      </div>
    </div>
  `;
}

function renderStepBody(step) {
  let html = '';

  if (step.instructions) {
    html += `<ol class="instruction-list">`;
    step.instructions.forEach((ins, i) => {
      html += `<li class="instruction-item">
        <span class="instruction-num">${i + 1}</span>
        <span class="instruction-text">${ins}</span>
      </li>`;
    });
    html += `</ol>`;
  }

  if (step.codeBlock) {
    html += `<div class="code-block">${escapeHtml(step.codeBlock)}</div>`;
  }

  if (step.scenarios) {
    html += `<div class="scenario-tabs">`;
    step.scenarios.forEach((s, i) => {
      html += `<button class="scenario-tab ${i === 0 ? 'active' : ''}" onclick="switchScenario(this, '${step.id}-sc${i}')">${s.label}</button>`;
    });
    html += `</div>`;
    step.scenarios.forEach((s, i) => {
      html += `<div class="scenario-content ${i === 0 ? 'active' : ''}" id="${step.id}-sc${i}">
        <div class="code-block">${escapeHtml(s.content)}</div>
      </div>`;
    });
  }

  if (step.tip) html += `<div class="tip-box">💡 ${step.tip}</div>`;
  if (step.warn) html += `<div class="warn-box">⚠️ ${step.warn}</div>`;
  if (step.info) html += `<div class="info-box">ℹ️ ${step.info}</div>`;

  if (step.repeat) {
    const repKey = step.id + '-rep';
    const repCount = parseInt(state[repKey] || '0');
    html += `<div class="repeat-counter">
      <span class="repeat-label">반복 횟수:</span>
      <div class="repeat-dots">
        ${Array.from({length: step.repeat}, (_, i) => `
          <div class="repeat-dot ${i < repCount ? 'filled' : ''}" onclick="setRepeat('${step.id}', ${i + 1})"></div>
        `).join('')}
      </div>
      <span style="font-size:11px;color:#555;">${repCount}/${step.repeat}</span>
    </div>`;
  }

  if (step.pass) {
    html += `<div class="pass-criteria">
      <div class="pass-criteria-title">✅ 통과 기준</div>
      <ul class="criteria-list">
        <li class="criteria-item">${step.pass}</li>
      </ul>
    </div>`;
  }

  return html;
}

function toggleExpand(stepId) {
  expandedSteps[stepId] = !expandedSteps[stepId];
  render();
}

function setRepeat(stepId, count) {
  state[stepId + '-rep'] = String(count);
  saveState();
  render();
}

function switchScenario(btn, targetId) {
  const tabs = btn.parentElement.querySelectorAll('.scenario-tab');
  tabs.forEach(t => t.classList.remove('active'));
  btn.classList.add('active');

  const prefix = targetId.split('-sc')[0];
  document.querySelectorAll(`[id^="${prefix}-sc"]`).forEach(el => el.classList.remove('active'));
  document.getElementById(targetId).classList.add('active');
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// 초기 렌더
render();
</script>
</body>
</html>
